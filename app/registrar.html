<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registar — V4M</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { width: 100%; max-width: 420px; }
    .auth-header { text-align: center; margin-bottom: 40px; }
    .auth-header h1 { font-size: 1.75rem; margin-bottom: 8px; }
    .auth-header p { color: rgba(255,255,255,0.5); font-size: 0.9375rem; }
    .auth-form { display: flex; flex-direction: column; gap: 20px; }
    .auth-links { text-align: center; margin-top: 24px; }
    .auth-links a { color: #D7FF00; font-size: 0.875rem; }
    .auth-links p { color: rgba(255,255,255,0.4); font-size: 0.875rem; margin-top: 8px; }
    .error-msg { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #EF4444; padding: 12px 16px; border-radius: 12px; font-size: 0.875rem; display: none; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.5); font-size: 0.875rem; margin-bottom: 32px; transition: color 0.3s; }
    .back-link:hover { color: #D7FF00; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <a href="/" class="back-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Voltar
      </a>
      <div class="auth-header">
        <a href="/" style="display: inline-block; margin-bottom: 24px;">
          <span class="logo-text" style="font-size: 2rem;">V<span class="text-yellow">4</span>M</span>
        </a>
        <h1>Criar conta</h1>
        <p>Registe-se para solicitar assistência rapidamente</p>
      </div>
      <div id="error-msg" class="error-msg"></div>
      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label class="form-label">Nome completo</label>
          <input type="text" id="name" class="form-input" placeholder="O seu nome" required>
        </div>
        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input type="tel" id="phone" class="form-input" placeholder="+244 9XX XXX XXX" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email (opcional)</label>
          <input type="email" id="email" class="form-input" placeholder="exemplo@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Palavra-passe</label>
          <input type="password" id="password" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">Criar Conta</button>
      </form>
      <div class="auth-links">
        <p>Já tem conta? <a href="/entrar">Inicie sessão</a></p>
      </div>
    </div>
  </div>
  <script>
    if (localStorage.getItem('v4m_token')) {
      window.location.href = '/dashboard';
    }
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error-msg');
      errorEl.style.display = 'none';
      try {
        const data = await apiRequest('/api/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value || undefined,
            password: document.getElementById('password').value
          })
        });
        setToken(data.token);
        setUser(data.user);
        window.location.href = '/dashboard';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
  <script src="js/app.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
