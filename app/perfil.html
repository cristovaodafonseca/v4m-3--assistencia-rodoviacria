<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — V4M</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .page-content { padding-top: 120px; padding-bottom: 64px; }
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 1.75rem; margin-bottom: 4px; }
    .page-header p { color: rgba(255,255,255,0.5); }
    .profile-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 32px; margin-bottom: 24px; }
    .profile-card h3 { font-size: 1.125rem; margin-bottom: 24px; }
    .success-msg { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); color: #22C55E; padding: 12px 16px; border-radius: 12px; font-size: 0.875rem; display: none; margin-bottom: 16px; }
    .error-msg { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #EF4444; padding: 12px 16px; border-radius: 12px; font-size: 0.875rem; display: none; margin-bottom: 16px; }
    .danger-zone { border-color: rgba(239, 68, 68, 0.2); }
    .danger-zone h3 { color: #EF4444; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="page-content">
    <div class="container" style="max-width: 600px;">
      <div class="page-header">
        <h1>O Meu <span class="text-yellow">Perfil</span></h1>
        <p>Gerir os seus dados pessoais.</p>
      </div>

      <!-- Profile Info -->
      <div class="profile-card">
        <h3>Dados Pessoais</h3>
        <div id="profile-success" class="success-msg"></div>
        <div id="profile-error" class="error-msg"></div>
        <form id="profile-form">
          <div class="form-group">
            <label class="form-label">Nome</label>
            <input type="text" id="profile-name" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Telefone</label>
            <input type="tel" id="profile-phone" class="form-input" disabled style="opacity: 0.5;">
            <small style="color: rgba(255,255,255,0.3); font-size: 0.75rem;">O telefone não pode ser alterado</small>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="profile-email" class="form-input" placeholder="exemplo@email.com">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Guardar Alterações</button>
        </form>
      </div>

      <!-- Change Password -->
      <div class="profile-card">
        <h3>Alterar Palavra-passe</h3>
        <div id="password-success" class="success-msg"></div>
        <div id="password-error" class="error-msg"></div>
        <form id="password-form">
          <div class="form-group">
            <label class="form-label">Palavra-passe actual</label>
            <input type="password" id="current-password" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Nova palavra-passe</label>
            <input type="password" id="new-password" class="form-input" required minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label">Confirmar nova palavra-passe</label>
            <input type="password" id="confirm-password" class="form-input" required minlength="6">
          </div>
          <button type="submit" class="btn btn-outline" style="width: 100%;">Alterar Palavra-passe</button>
        </form>
      </div>

      <!-- Account Info -->
      <div class="profile-card">
        <h3>Informações da Conta</h3>
        <div style="display: flex; flex-direction: column; gap: 12px;">
          <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06);">
            <span style="color: rgba(255,255,255,0.4); font-size: 0.875rem;">Membro desde</span>
            <span style="font-size: 0.875rem; font-weight: 500;" id="member-since">—</span>
          </div>
          <div style="display: flex; justify-content: space-between; padding: 8px 0;">
            <span style="color: rgba(255,255,255,0.4); font-size: 0.875rem;">Plano actual</span>
            <span style="font-size: 0.875rem; font-weight: 500; color: #D7FF00;" id="current-plan">—</span>
          </div>
        </div>
      </div>

      <!-- Danger Zone -->
      <div class="profile-card danger-zone">
        <h3>Zona de Perigo</h3>
        <p style="color: rgba(255,255,255,0.4); font-size: 0.875rem; margin-bottom: 16px;">Após eliminar a conta, todos os dados serão apagados permanentemente.</p>
        <button class="btn btn-outline" style="border-color: rgba(239, 68, 68, 0.3); color: #EF4444;" onclick="alert('Funcionalidade disponível em breve.')">Eliminar Conta</button>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script src="js/app.js"></script>
  <script>
    initApp('perfil');

    async function loadProfile() {
      try {
        const user = await apiRequest('/api/auth/me');
        setUser(user);
        document.getElementById('profile-name').value = user.name;
        document.getElementById('profile-phone').value = user.phone;
        document.getElementById('profile-email').value = user.email || '';
        document.getElementById('member-since').textContent = formatDate(user.created_at);
        document.getElementById('current-plan').textContent = user.plan === 'none' ? 'Sem plano' : `Plano ${user.plan}`;
      } catch (err) {
        console.error(err);
      }
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const successEl = document.getElementById('profile-success');
      const errorEl = document.getElementById('profile-error');
      successEl.style.display = 'none';
      errorEl.style.display = 'none';

      try {
        const data = await apiRequest('/api/user/profile', {
          method: 'PUT',
          body: JSON.stringify({
            name: document.getElementById('profile-name').value,
            email: document.getElementById('profile-email').value
          })
        });
        setUser(data);
        successEl.textContent = 'Perfil actualizado com sucesso!';
        successEl.style.display = 'block';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });

    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const successEl = document.getElementById('password-success');
      const errorEl = document.getElementById('password-error');
      successEl.style.display = 'none';
      errorEl.style.display = 'none';

      const newPass = document.getElementById('new-password').value;
      const confirmPass = document.getElementById('confirm-password').value;

      if (newPass !== confirmPass) {
        errorEl.textContent = 'As palavra-passes não coincidem.';
        errorEl.style.display = 'block';
        return;
      }

      try {
        await apiRequest('/api/user/password', {
          method: 'PUT',
          body: JSON.stringify({
            currentPassword: document.getElementById('current-password').value,
            newPassword: newPass
          })
        });
        successEl.textContent = 'Palavra-passe alterada com sucesso!';
        successEl.style.display = 'block';
        document.getElementById('password-form').reset();
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });

    loadProfile();
  </script>
</body>
</html>
